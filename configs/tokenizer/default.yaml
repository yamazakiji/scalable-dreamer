name: tokenizer_default
seed: 42

tokenizer:
  image_size: 128
  patch_size: 16
  in_channels: 3
  embed_dim: 512
  num_heads: 8
  num_latents: 64
  latent_dim: 128
  gradient_checkpointing: true

training:
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 3000
  max_steps: 20000
  grad_clip: 1.0
  batch_size: 4
  num_workers: 0
  checkpoint_every: 1000
  eval_every: 500
  log_every: 50
  save_dir: outputs

use_wandb: true
wandb_project: world_models
